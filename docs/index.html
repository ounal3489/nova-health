<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova — Your Cycle, Your Power</title>
    <script>
        // Auto-redirect based on browser language
        const lang = navigator.language || navigator.userLanguage;
        if (lang.startsWith('tr')) {
            window.location.href = 'tr/';
        } else {
            window.location.href = 'en/';
        }
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #FDFAFF; text-align: center; }
        .container { padding: 40px; }
        h1 { font-size: 36px; background: linear-gradient(135deg, #6B3FA0, #D973A6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 24px; }
        .links { display: flex; gap: 16px; justify-content: center; }
        a { display: inline-block; padding: 12px 32px; border-radius: 25px; text-decoration: none; font-weight: 600; font-size: 16px; transition: transform 0.2s; }
        a:hover { transform: scale(1.05); }
        .tr { background: linear-gradient(135deg, #6B3FA0, #D973A6); color: white; }
        .en { background: white; color: #6B3FA0; border: 2px solid #6B3FA0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nova</h1>
        <p style="color: #888; margin-bottom: 32px;">Choose your language / Dilinizi seçin</p>
        <div class="links">
            <a href="tr/" class="tr">Türkçe</a>
            <a href="en/" class="en">English</a>
        </div>
    </div>
</body>
</html>
