name: Nova
options:
  bundleIdPrefix: com.oguz.nova
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  developmentLanguage: tr

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "Nova"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule
      VALIDATE_PRODUCT: YES

targets:
  Nova:
    type: application
    platform: iOS
    sources:
      - path: FemBoard
        excludes:
          - "**/.DS_Store"
          - "**/FemBoard.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oguz.nova.health
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSHealthShareUsageDescription: "We need access to display your health data in the app."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "We need access to save your cycle data to Apple Health."
        INFOPLIST_KEY_CFBundleName: "Nova"
        INFOPLIST_KEY_CFBundleShortVersionString: "2.0.0"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          ENABLE_BITCODE: NO
